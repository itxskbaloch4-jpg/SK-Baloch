<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin CRM & CMS | SK Baloch</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .tab-btn.active { border-bottom: 2px solid #10b981; color: #10b981; }
        #adminContent { display: none; }
        .hidden-section { display: none; }
    </style>
</head>
<body class="bg-[#050505] text-white font-sans selection:bg-emerald-500/30">

    <div id="loginSection" class="fixed inset-0 z-[100] flex items-center justify-center bg-black">
        <div class="glass p-8 rounded-3xl w-full max-w-md border-emerald-500/20">
            <div class="text-center mb-8">
                <div class="inline-block p-3 bg-emerald-500/10 rounded-2xl mb-4">
                    <i data-lucide="shield-check" class="text-emerald-400 w-8 h-8"></i>
                </div>
                <h2 class="text-2xl font-bold text-white">Admin Access</h2>
                <p class="text-gray-400 text-sm">Enter password to manage your digital assets</p>
            </div>
            <input type="password" id="adminPass" placeholder="••••••••" class="w-full p-4 rounded-xl bg-white/5 border border-white/10 mb-4 outline-none focus:border-emerald-500 transition-all text-center tracking-widest">
            <button onclick="checkLogin()" class="w-full py-4 bg-emerald-500 text-black font-bold rounded-xl hover:bg-emerald-400 transition-all transform active:scale-95">Login to Dashboard</button>
            <p id="loginError" class="text-red-500 mt-4 text-center hidden">Invalid Credentials!</p>
        </div>
    </div>

    <div id="adminContent">
        <nav class="border-b border-white/5 p-4 glass sticky top-0 z-50">
            <div class="container mx-auto flex justify-between items-center">
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 bg-emerald-500 rounded-lg flex items-center justify-center text-black font-bold">SK</div>
                    <h1 class="text-xl font-bold tracking-tight">Baloch <span class="text-emerald-400">Control</span></h1>
                </div>
                
                <div class="flex items-center gap-6">
                    <div class="flex gap-4">
                        <button onclick="switchTab('leads')" id="btn-leads" class="tab-btn active px-2 py-1 text-sm font-medium">Leads</button>
                        <button onclick="switchTab('cms')" id="btn-cms" class="tab-btn px-2 py-1 text-sm font-medium text-gray-400">Website CMS</button>
                        <button onclick="switchTab('pages')" id="btn-pages" class="tab-btn px-2 py-1 text-sm font-medium text-gray-400">Pages</button>
                    </div>
                    <button onclick="logout()" class="p-2 text-gray-400 hover:text-red-400 transition"><i data-lucide="log-out"></i></button>
                </div>
            </div>
        </nav>

        <main class="container mx-auto p-6">
            
            <div id="section-leads">
                <div class="grid md:grid-cols-3 gap-6 mb-8">
                    <div class="p-6 glass rounded-2xl border-l-4 border-l-gray-500">
                        <p class="text-gray-400 text-xs uppercase tracking-wider mb-1">Total Requests</p>
                        <h3 id="totalLeads" class="text-3xl font-bold">0</h3>
                    </div>
                    <div class="p-6 glass rounded-2xl border-l-4 border-l-emerald-500">
                        <p class="text-gray-400 text-xs uppercase tracking-wider mb-1">High Intent (AI)</p>
                        <h3 id="highScoreLeads" class="text-3xl font-bold text-emerald-400">0</h3>
                    </div>
                    <div class="p-6 glass rounded-2xl border-l-4 border-l-blue-500">
                        <p class="text-gray-400 text-xs uppercase tracking-wider mb-1">Active Deals</p>
                        <h3 id="activeLeads" class="text-3xl font-bold text-blue-400">0</h3>
                    </div>
                </div>

                <div class="glass rounded-2xl overflow-hidden border border-white/5">
                    <table class="w-full text-left border-collapse">
                        <thead class="bg-white/5 text-gray-400 text-[11px] uppercase tracking-widest">
                            <tr>
                                <th class="p-4">Prospect Details</th>
                                <th class="p-4 text-center">Quality Score</th>
                                <th class="p-4">Current Status</th>
                                <th class="p-4">Received</th>
                                <th class="p-4 text-right">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="leadsTableBody" class="divide-y divide-white/5 text-sm">
                            </tbody>
                    </table>
                </div>
            </div>

            <div id="section-cms" class="hidden-section">
                <div class="max-w-4xl mx-auto">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-2xl font-bold">Customize Homepage</h2>
                        <button id="saveContentBtn" onclick="updateWebsiteContent()" class="px-6 py-2 bg-emerald-500 text-black font-bold rounded-lg hover:shadow-[0_0_20px_rgba(16,185,129,0.4)] transition">Save Changes</button>
                    </div>

                    <div class="grid gap-6">
                        <div class="p-6 glass rounded-2xl">
                            <h4 class="text-emerald-400 font-bold mb-4 flex items-center gap-2"><i data-lucide="layout"></i> Hero Section</h4>
                            <div class="space-y-4">
                                <div>
                                    <label class="text-xs text-gray-400 block mb-1">Main Heading</label>
                                    <input type="text" id="edit-title" class="w-full p-3 rounded-lg bg-black/40 border border-white/10 outline-none focus:border-emerald-500">
                                </div>
                                <div>
                                    <label class="text-xs text-gray-400 block mb-1">Sub-headline / Description</label>
                                    <textarea id="edit-desc" rows="3" class="w-full p-3 rounded-lg bg-black/40 border border-white/10 outline-none focus:border-emerald-500"></textarea>
                                </div>
                            </div>
                        </div>

                        <div class="p-6 glass rounded-2xl">
                            <h4 class="text-blue-400 font-bold mb-4 flex items-center gap-2"><i data-lucide="image"></i> Visual Media</h4>
                            <div class="space-y-4">
                                <div>
                                    <label class="text-xs text-gray-400 block mb-1">Hero Background Image URL</label>
                                    <input type="text" id="edit-img" placeholder="https://unsplash.com/..." class="w-full p-3 rounded-lg bg-black/40 border border-white/10 outline-none focus:border-emerald-500">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div id="section-pages" class="hidden-section">
                <div class="max-w-4xl mx-auto">
                    <div class="p-6 glass rounded-2xl border border-dashed border-white/20 mb-6">
                        <h3 class="text-xl font-bold mb-4">Add New Web Page</h3>
                        <div class="grid md:grid-cols-2 gap-4 mb-4">
                            <input type="text" id="page-title" placeholder="Page Title (e.g. Services)" class="p-3 rounded-lg bg-black/40 border border-white/10 outline-none focus:border-emerald-500">
                            <input type="text" id="page-slug" placeholder="URL Slug (e.g. services)" class="p-3 rounded-lg bg-black/40 border border-white/10 outline-none focus:border-emerald-500">
                        </div>
                        <textarea id="page-html" rows="10" placeholder="Paste HTML/Tailwind Code Here..." class="w-full p-4 rounded-lg bg-black/40 border border-white/10 font-mono text-sm mb-4"></textarea>
                        <button onclick="createNewPage()" class="w-full py-3 bg-blue-600 rounded-lg font-bold hover:bg-blue-500 transition">Publish Page</button>
                    </div>
                </div>
            </div>

        </main>
    </div>

    <script src="js/admin.js"></script>
    <script>
        // Tab Switching Logic
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active', 'text-emerald-400'));
            document.querySelectorAll('[id^="section-"]').forEach(s => s.classList.add('hidden-section'));
            
            document.getElementById('btn-' + tab).classList.add('active', 'text-emerald-400');
            document.getElementById('section-' + tab).classList.remove('hidden-section');
            
            lucide.createIcons();
        }
        
        // Initialize Lucide Icons
        lucide.createIcons();
    </script>
</body>
</html>
