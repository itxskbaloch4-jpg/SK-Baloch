<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-white">

  <div class="flex min-h-screen">

    <aside class="w-72 bg-black p-6 border-r border-gray-800">
      <h2 class="text-3xl font-bold mb-10">ADMIN PANEL</h2>

      <ul class="space-y-4">
        <li><button class="w-full text-left">Pages</button></li>
        <li><button class="w-full text-left">Themes</button></li>
        <li><button class="w-full text-left">Animations</button></li>
        <li><button class="w-full text-left">Media</button></li>
        <li><button class="w-full text-left">SEO</button></li>
      </ul>
    </aside>

    <main class="flex-1 p-10">
      <div class="flex justify-between items-center mb-10">
        <h1 class="text-4xl font-bold">Dashboard</h1>

        <button class="bg-blue-600 px-6 py-3 rounded-xl">
          Create Page
        </button>
      </div>

      <div class="grid grid-cols-3 gap-6">

</html>
